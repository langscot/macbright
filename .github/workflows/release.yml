name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Build .app
        run: make app

      - name: Ad-hoc sign
        run: |
          codesign --force --deep --sign - .build/MacBright.app
          codesign --verify --deep --strict --verbose=2 .build/MacBright.app

      - name: Zip
        run: |
          cd .build
          ditto -c -k --sequesterRsrc --keepParent MacBright.app MacBright.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacBright
          path: .build/MacBright.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: .build/MacBright.zip
          generate_release_notes: true
